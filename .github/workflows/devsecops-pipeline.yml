name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-testing:
    name: Code Security & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Static Application Security Testing (SAST) with Bandit
        run: bandit -r app/ -ll -ii

      - name: Install pip-audit
        run: pip install pip-audit 

      - name: Software Composition Analysis (SCA) with pip-audit
        run: pip-audit -r requirements.txt

      - name: Install pytest
        run: pip install pytest

      - name: Run Unit Tests with Pytest
        run: python -m pytest tests/ -v

  container-build-and-scan:
    name: Container Build & Vulnerability Scan
    needs: security-and-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deployment
    needs: container-build-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate Production Deployment
        run: |
          echo "✅ All security checks and tests passed."
          echo "🚀 Deploying secure-app:${{ github.sha }} to production environment..."
          sleep 2
          echo "🎉 Deployment successful!"